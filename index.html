<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Viral Reels Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 16px;
    }

    .container {
      width: 100%;
      max-width: 600px;
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: linear-gradient(90deg, #a855f7, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #fff 60%, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 15px;
      color: #888;
      margin-bottom: 36px;
      line-height: 1.6;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 8px;
    }

    input[type="text"], select {
      width: 100%;
      padding: 12px 16px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      color: #f0f0f0;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus, select:focus {
      border-color: #7c3aed;
    }

    input[type="text"]::placeholder { color: #555; }

    select option { background: #1a1a1a; }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .btn {
      width: 100%;
      padding: 14px 24px;
      margin-top: 8px;
      background: linear-gradient(135deg, #7c3aed, #db2777);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }

    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .output {
      margin-top: 36px;
      display: none;
    }

    .loading {
      text-align: center;
      color: #666;
      font-size: 14px;
      padding: 24px 0;
      display: none;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid #333;
      border-top-color: #a855f7;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .section {
      margin-bottom: 24px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 10px;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 14px;
      color: #d0d0d0;
      line-height: 1.6;
      margin-bottom: 8px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 999px;
      padding: 5px 14px;
      font-size: 13px;
      color: #888;
    }

    .divider {
      border: none;
      border-top: 1px solid #1f1f1f;
      margin-bottom: 28px;
    }

    @media (max-width: 480px) {
      .row { grid-template-columns: 1fr; }
      h1 { font-size: 26px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">AI-Powered Content Tool</div>
    <h1>Generate Viral Reels in Seconds</h1>
    <p class="subtitle">Drop your topic, pick your vibe — get hooks, captions &amp; editing ideas instantly.</p>

    <div class="form-group">
      <label for="topic">Your Topic</label>
      <input id="topic" type="text" placeholder="e.g. morning routine, travel hacks, fitness tips..." />
    </div>

    <div class="row">
      <div class="form-group">
        <label for="platform">Platform</label>
        <select id="platform">
          <option value="Instagram Reels">Instagram Reels</option>
          <option value="TikTok">TikTok</option>
          <option value="YouTube Shorts">YouTube Shorts</option>
        </select>
      </div>
      <div class="form-group">
        <label for="tone">Tone</label>
        <select id="tone">
          <option value="Hype">Hype</option>
          <option value="Emotional">Emotional</option>
          <option value="Funny">Funny</option>
          <option value="Cinematic">Cinematic</option>
        </select>
      </div>
    </div>

    <button class="btn" id="genBtn" onclick="generateIdeas()">Generate Ideas</button>

    <div class="output" id="output">
      <div class="loading" id="loading">
        <span class="spinner"></span>Generating your content ideas...
      </div>
      <div id="result"></div>
    </div>
  </div>

  <script>
    async function generateIdeas() {
      const topic = document.getElementById('topic').value.trim();
      const platform = document.getElementById('platform').value;
      const tone = document.getElementById('tone').value;

      if (!topic) {
        document.getElementById('topic').focus();
        return;
      }

      const btn = document.getElementById('genBtn');
      const output = document.getElementById('output');
      const loading = document.getElementById('loading');
      const result = document.getElementById('result');

      btn.disabled = true;
      btn.textContent = 'Generating...';
      output.style.display = 'block';
      loading.style.display = 'block';
      result.innerHTML = '';

      const prompt = `You are a viral short-form video content strategist. Generate content ideas for a ${platform} video about "${topic}" with a ${tone} tone.

Return ONLY a JSON object (no markdown, no backticks) with this exact structure:
{
  "hooks": ["hook 1", "hook 2", "hook 3"],
  "captions": ["caption 1", "caption 2"],
  "editingIdeas": ["editing idea 1", "editing idea 2", "editing idea 3"],
  "hashtags": ["#tag1", "#tag2", "#tag3", "#tag4", "#tag5"]
}`;

      try {
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 1000,
            messages: [{ role: "user", content: prompt }]
          })
        });

        const data = await res.json();
        const text = data.content.map(i => i.text || "").join("\n");
        const clean = text.replace(/```json|```/g, "").trim();
        const parsed = JSON.parse(clean);

        loading.style.display = 'none';

        const section = (label, items) =>
          `<div class="section">
            <div class="section-label">${label}</div>
            ${items.map(item => `<div class="card">${item}</div>`).join('')}
          </div>`;

        const hashtagHtml = `<div class="section">
          <div class="section-label">Hashtags</div>
          <div class="tags">${parsed.hashtags.map(tag => `<span class="tag">${tag}</span>`).join('')}</div>
        </div>`;

        result.innerHTML =
          `<hr class="divider">` +
          section('Hooks', parsed.hooks) +
          section('Captions', parsed.captions) +
          section('Editing ideas', parsed.editingIdeas) +
          hashtagHtml;

      } catch (err) {
        loading.style.display = 'none';
        result.innerHTML = `<p style="color:#f87171;font-size:14px;padding:1rem 0;">Something went wrong. Check your API key or try again.</p>`;
      }

      btn.disabled = false;
      btn.textContent = 'Generate Ideas';
    }

    document.getElementById('topic').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') generateIdeas();
    });
  </script>
</body>
</html>
