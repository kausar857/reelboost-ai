<!DOCTYPE html>
<html>
<head>
  <title>ReelBoost AI</title>
  <style>
    body {
      background: #0a0a0a;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 50px;
    }
    input, button {
      padding: 10px;
      margin: 10px;
      border-radius: 8px;
      border: none;
    }
    button {
      background: purple;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>🚀 ReelBoost AI</h1>
  <p>Generate viral hooks for your reels</p>

  <input id="topic" placeholder="Enter your topic..." />
  <br>
  <button onclick="generate()">Generate Hook</button>

  <p id="output"></p>

  <script>
    async function generate() {
      const topic = document.getElementById("topic").value;

      const res = await fetch("/api/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ topic })
      });

      const data = await res.json();
      document.getElementById("output").innerText = data.result || "Error";
    }
  </script>

</body>
</html>
