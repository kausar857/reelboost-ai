<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ReelBoost AI</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0a0a0a, #14002b);
  color: white;
  text-align: center;
}

.container {
  padding: 60px 20px;
}

h1 {
  font-size: 48px;
  background: linear-gradient(90deg, #a855f7, #9333ea);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.sub {
  color: #bbb;
  margin-bottom: 30px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 30px;
  border-radius: 16px;
  max-width: 500px;
  margin: auto;
  box-shadow: 0 0 30px rgba(168,85,247,0.3);
}

input, select, button {
  width: 90%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
}

input, select {
  background: #111;
  color: white;
}

button {
  background: #a855f7;
  color: white;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  background: #9333ea;
}

.output {
  margin-top: 20px;
  color: #00ffcc;
}
</style>
</head>

<body>

<div class="container">

<h1>ReelBoost AI</h1>
<p class="sub">Generate viral hooks, captions & ideas instantly 🚀</p>

<div class="card">

<input id="topic" placeholder="What is your video about?" />

<select id="platform">
  <option>Instagram Reels</option>
  <option>YouTube Shorts</option>
  <option>TikTok</option>
</select>

<select id="tone">
  <option>🔥 Hype & Energetic</option>
  <option>💡 Informative</option>
  <option>😂 Funny</option>
</select>

<button onclick="generate()">Generate Ideas</button>

<div id="output" class="output"></div>

</div>

</div>

<script>
async function generate() {
  const topic = document.getElementById("topic").value;

  const res = await fetch("/api/generate", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ topic })
  });

  const data = await res.json();
  document.getElementById("output").innerText =
    data.result || "⚠️ AI not connected yet";
}
</script>

</body>
</html>
