<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ReelBoost AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: #1a1a1a;
      border-radius: 16px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 0 40px rgba(255, 80, 80, 0.15);
    }

    h1 {
      font-size: 2rem;
      background: linear-gradient(90deg, #ff4d4d, #f9cb28);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    p.subtitle {
      color: #888;
      margin-bottom: 28px;
      font-size: 0.95rem;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #111;
      color: #fff;
      font-size: 1rem;
      margin-bottom: 14px;
      outline: none;
      transition: border 0.2s;
    }

    input:focus { border-color: #ff4d4d; }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(90deg, #ff4d4d, #f9cb28);
      color: #000;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    #output {
      margin-top: 28px;
      background: #111;
      border-radius: 10px;
      padding: 20px;
      font-size: 0.9rem;
      line-height: 1.7;
      white-space: pre-wrap;
      border: 1px solid #222;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎬 ReelBoost AI</h1>
    <p class="subtitle">Generate viral reel scripts, hooks & captions instantly</p>

    <input
      type="text"
      id="topic"
      placeholder="Enter your reel topic (e.g. morning routine, fitness tips...)"
    />
    <button onclick="generate()" id="btn">⚡ Generate Reel</button>

    <pre id="output"></pre>
  </div>

  <script>
    async function generate() {
      const topic = document.getElementById("topic").value.trim();
      if (!topic) return alert("Please enter a topic!");

      const btn = document.getElementById("btn");
      const output = document.getElementById("output");

      btn.disabled = true;
      btn.textContent = "Generating...";
      output.style.display = "none";

      try {
        const res = await fetch("/api/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ topic })
        });
        const data = await res.json();

        output.style.display = "block";
        output.innerText =
`🔥 HOOK
${data.hook}

📜 SCRIPT
${data.script}

📝 CAPTION
${data.caption}

#️⃣ HASHTAGS
${data.hashtags.join("  ")}`;

      } catch (err) {
        output.style.display = "block";
        output.innerText = "❌ Error generating reel. Please try again.";
      } finally {
        btn.disabled = false;
        btn.textContent = "⚡ Generate Reel";
      }
    }
  </script>
</body>
</html>
